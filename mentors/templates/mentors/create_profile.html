{% extends 'base.html' %}
{% load static %}

{% block title %}Create Mentor Profile{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h2 class="card-title text-center mb-4" style="font-weight:700; color:#007bff;">Create Your Mentor Profile</h2>
                    <p class="text-center text-muted mb-4">
                        Fill in your details to let mentees book sessions with you.
                    </p>

                    <form method="POST" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}
                        
                        <div class="d-grid mt-3">
                            <button type="submit" class="btn btn-primary btn-lg">Save Profile</button>
                        </div>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm">← Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
