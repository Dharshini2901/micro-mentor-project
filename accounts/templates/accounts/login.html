{% extends 'base.html' %}
{% load static %}

{% block title %}Login{% endblock %}

{% block content %}
<link rel="stylesheet" href="{% static 'css/login.css' %}">

<div class="login-page d-flex justify-content-center align-items-center">
    <div class="login-container card shadow-sm p-4">
        <h2 class="text-center mb-3">Welcome Back!</h2>
        <p class="text-center text-muted mb-4">
            Login to access your dashboard and manage your bookings
        </p>
        
        <form method="post" class="login-form">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">Login</button>
            </div>
        </form>

        <div class="text-center mt-3">
            <p class="text-muted">Don't have an account? 
                <a href="{% url 'register' %}" class="text-decoration-none">Register here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
